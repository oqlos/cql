``\n\n### `flow.toon` - Legacy Data Flow Analysis\n**Purpose**: Understand data movement through the system (legacy / explicit opt-in)\n**Key sections**:\n- **PIPELINES**: Data processing chains\n- **CONTRACTS**: Function input/output contracts\n- **SIDE_EFFECTS**: Functions with external impacts\n\n**Example usage**:\n```bash\n# Find data pipelines\ngrep \"PIPELINES\" flow.toon\n\n# Identify side effects\ngrep \"SIDE_EFFECTS\" flow.toon\n```\n\n### `map.toon.yaml` - Structural Map + Project Header\n**Purpose**: High-level architecture overview plus compact project header\n**Key sections**:\n- **MODULES**: All modules with basic stats\n- **IMPORTS**: Dependency relationships\n- **EXPORTS**: Public API surface and signatures\n- **HEADER**: Stats, alerts, hotspots, evolution trend\n\n**Example usage**:\n```bash\n# See project structure\ncat map.toon.yaml | head -50\n\n# Find public APIs\ngrep \"SIGNATURES\" map.toon.yaml\n```\n\n### `project.toon.yaml` - Compact Analysis View\n**Purpose**: Compact module view generated from project.yaml data\n**Status**: Legacy view generated on demand from unified project.yaml\n\n**Example usage**:\n```bash\n# View compact project structure\ncat project.toon.yaml | head -30\n\n# Find largest files\ngrep -E \"^  .*[0-9]{3,}$\" project.toon.yaml | sort -t',' -k2 -n -r | head -10\n```\n\n### `prompt.txt` - Ready-to-Send LLM Prompt\n**Purpose**: Pre-formatted prompt listing all generated files for LLM conversation\n**Generation**: Written when `code2llm` runs with a source path and requests `-f all` (including `--no-chunk`) or `code2logic`\n**Contents**:\n- **Files section**: Lists all existing generated files with descriptions, including `project.toon.yaml` when generated by `-f all`\n- **Source files section**: Highlights important source files such as `cli_exports/orchestrator.py`\n- **Missing section**: Shows which files weren't generated (if any)\n- **Task section**: Refactoring brief with concrete execution instructions, not just analysis\n- **Priority Order section**: State-dependent refactoring priorities, starting with blockers and then architecture cleanup\n- **Requirements section**: Guidelines for suggested changes\n\n**Example usage**:\n```bash\n# View the prompt\ncat prompt.txt\n\n# Copy to clipboard and paste into ChatGPT/Claude\ncat prompt.txt | pbcopy  # macOS\ncat prompt.txt | xclip -sel clip  # Linux\n```\n\n### `context.md` - LLM Narrative\n**Purpose**: Ready-to-paste context for AI assistants\n**Key sections**:\n- **Overview**: Project statistics\n- **Architecture**: Module breakdown\n- **Entry Points**: Public interfaces\n- **Patterns**: Design patterns detected\n\n**Example usage**:\n```bash\n# Copy to clipboard for LLM\ncat context.md | pbcopy  # macOS\ncat context.md | xclip -sel clip  # Linux\n\n# Use with Claude/ChatGPT for code analysis\n```\n\n### Visualization Files (`*.mmd`, `*.png`)\n**Purpose**: Visual understanding of code structure\n**Files**:\n- `flow.mmd` - Detailed control flow with complexity colors\n- `calls.mmd` - Simple call graph\n- `compact_flow.mmd` - High-level module view\n- `*.png` - Pre-rendered images\n\n**Example usage**:\n```bash\n# View diagrams\nopen flow.png  # macOS\nxdg-open flow.png  # Linux\n\n# Edit in Mermaid Live Editor\n# Copy content of .mmd files to https://mermaid.live\n```\n\n## 🔍 Common Analysis Patterns\n\n### 1. Code Health Assessment\n```bash\n# Quick health check\ncode2llm ./ -f toon\ncat analysis.toon | grep -E \"(HEALTH|REFACTOR)\"\n```\n\n### 2. Refactoring Planning\n```bash\n# Get refactoring queue\ncode2llm ./ -f evolution\ncat evolution.toon.yaml\n\n# Focus on specific issues\ncode2llm ./ -f toon --refactor --smell god_function\n```\n\n### 3. LLM Assistance\n```bash\n# Generate context for AI\ncode2llm ./ -f context\ncat context.md\n\n# Use with Claude: \"Based on this context, help me refactor the god modules\"\n```\n\n### 4. Team Documentation\n```bash\n# Generate all docs for team\ncode2llm ./ -f all -o ./docs/\n\n# Cr         let currentFile = null;

        function renderFileList(filter = '') {
            const list = document.getElementById('fileList');
            const filtered = files.filter(f =>
                f.name.toLowerCase().includes(filter.toLowerCase()) ||
                f.path.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">No files found</div>';
                return;
            }

            // Group by type
            const groups = {};
            for (const file of filtered) {
                const type = file.type_name;
                if (!groups[type]) groups[type] = [];
                groups[type].push(file);
            }

            let html = '';
            for (const [typeName, groupFiles] of Object.entries(groups)) {
                html += `
                    <div class="file-group">
                        <div class="file-group-title">${typeName} Files (${groupFiles.length})</div>
                        ${groupFiles.map(f => `
                            <div class="file-item ${currentFile?.name === f.name ? 'active' : ''}"
                                 onclick="selectFile('${f.name}')">
                                <span class="file-icon">${f.icon}</span>
                                <div class="file-info">
                                    <div class="file-name">${f.name}</div>
                                    <div class="file-meta">${f.path}</div>
                                </div>
                                <span class="file-size">${f.size}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            list.innerHTML = html;
        }

        function selectFile(name) {
            const file = files.find(f => f.name === name);
            if (!file) return;

            currentFile = file;

            document.getElementById('contentIcon').textContent = file.icon;
            document.getElementById('contentTitle').textContent = file.name;

            // Actions
            const actions = document.getElementById('contentActions');
            actions.innerHTML = `
                <a href="${file.rel_path}" download class="btn">⬇ Download</a>
                <a href="${file.rel_path}" target="_blank" class="btn btn-primary">↗ Open Raw</a>
            `;

            // Content
            const body = document.getElementById('contentBody');
            if (file.type === 'markdown') {
                // Render markdown as HTML using marked.js
                body.innerHTML = `<div class="markdown-content">${marked.parse(file.content)}</div>`;
            } else if (file.type === 'html') {
                // For HTML files, show in iframe for safety
                body.innerHTML = `<iframe src="${file.rel_path}" style="width:100%;height:100%;border:none;border-radius:0.5rem;"></iframe>`;
            } else if (file.type === 'image') {
                // For images, display the actual image
                body.innerHTML = `<div class="image-preview"><img src="${file.rel_path}" alt="${file.name}" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:0.5rem;"></div>`;
            } else if (file.type === 'mermaid') {
                // Render mermaid diagram
                const diagramId = 'mermaid-diagram-' + Date.now();
                body.innerHTML = `<div class="mermaid-content"><pre class="mermaid" id="${diagramId}">${file.content}</pre></div>`;
                // Initialize mermaid on the new element
                setTimeout(() => {
                    mermaid.init(undefined, document.getElementById(diagramId));
                }, 0);
            } else if (file.type === 'json') {
                try {
                    const json = JSON.parse(file.content.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&'));
                    const formatted = JSON.stringify(json, null, 2);
                    body.innerHTML = `<pre><code class="language-json">${formatted.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                    hljs.highlightElement(body.querySelector('code'));
                } catch {
                    body.innerHTML = `<pre>${file.content}</pre>`;
                }
            } else if (file.type === 'yaml') {
                // YAML with syntax highlighting
                body.innerHTML = `<pre><code class="language-yaml">${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else if (file.type === 'toon') {
                // TOON with simple highlighting (use ini as closest match for key: value format)
                body.innerHTML = `<pre><code class="language-ini">${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else if (file.type === 'code') {
                // Code files with auto-highlighting
                body.innerHTML = `<pre><code>${file.content.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
                hljs.highlightElement(body.querySelector('code'));
            } else {
                body.innerHTML = `<pre>${file.content}</pre>`;
            }

            renderFileList(document.getElementById('search').value);
        }

        function filterFiles(query) {
            renderFileList(query);
        }

        function renderStats() {
            const stats = {};
            for (const f of files) {
                stats[f.type_name] = (stats[f.type_name] || 0) + 1;
            }

            const grid = document.getElementById('statsGrid');
            grid.innerHTML = Object.entries(stats)
                .sort((a, b) => b[1] - a[1])
                .map(([type, count]) => `
                    <div class="stat-card">
                        <div class="stat-value">${count}</div>
                        <div class="stat-label">${type}</div>
                    </div>
                `).join('');
        }

        // Initialize
        renderStats();
        renderFileList();

        // Select first file if available
        if (files.length > 0) {
            selectFile(files[0].name);
        }
    </script>
